<section id="contact" class="contact section-padding">
    <div class="container">
        <div class="contact-wrapper">
            <div class="contact-info">
                <h2>Let's <span class="highlight">Connect</span></h2>
                <p>Ready to upgrade your security or power systems? Reach out to us today.</p>

                <div class="info-item">
                    <i class="fa-solid fa-phone"></i>
                    <div>
                        <h4>Phone</h4>
                        <p>+91 90929 29958</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-envelope"></i>
                    <div>
                        <h4>Email</h4>
                        <p>contact@joshenterprises.com</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <div>
                        <h4>Location</h4>
                        <p>Near vattakovil, Thoothukudi, Tamil Nadu</p>
                    </div>
                </div>
            </div>

            <form class="contact-form" (submit)="onSubmit($event)">
                <div class="form-group">
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <select>
                        <option value="" disabled selected>Interested In...</option>
                        <option value="cctv">CCTV Camera</option>
                        <option value="ro">RO Purifier</option>
                        <option value="inverter">Inverter</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <textarea placeholder="Message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn-primary full-width">Send Message</button>
            </form>
        </div>
    </div>
</section>
